<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Suit:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-card">
        <a class="back-link" href="{{ url_for('index') }}">메인으로</a>
        <p class="eyebrow">Sign In</p>
        <h1>Login</h1>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-list">
              {% for message in messages %}
                <p class="flash-message">{{ message }}</p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        <form method="post" class="auth-form">
          <input type="hidden" name="form_token" value="{{ form_token }}" />
          <input type="text" name="username" placeholder="아이디" value="{{ username or '' }}" required />
          <input type="password" name="password" placeholder="Password" required />
          <div class="captcha-box">
            <span class="captcha-label">Captcha</span>
            <strong>{{ captcha }}</strong>
          </div>
          <input type="text" name="captcha" placeholder="Captcha 입력" required />
          <button type="submit" class="primary-button">LOGIN</button>
        </form>
        <p class="sub-link">
          아직 계정이 없으면 <a href="{{ url_for('signup') }}">회원가입</a>
        </p>
      </section>
    </main>
  </body>
</html>
